<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGuard Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="layout">
      <section class="panel hero reveal">
        <p class="eyebrow">Web Vulnerability Scanner</p>
        <h1>WebGuard</h1>
        <p class="hero-copy">
          Launch authenticated scans, track live status, and review SQLi, XSS, and
          CSRF findings in one clean view.
        </p>
      </section>

      <section class="panel form-panel reveal delay-1">
        <h2>Start A Scan</h2>
        <form id="scanForm" class="form-grid">
          <label>
            API Base
            <input id="apiBase" type="url" value="http://127.0.0.1:8000/api" required />
          </label>

          <label>
            Target URL
            <input id="targetUrl" type="url" value="http://127.0.0.1:4280/" required />
          </label>

          <label class="full toggle-row">
            <input id="useAuth" type="checkbox" checked />
            Use Authentication
          </label>

          <div id="authFields" class="full auth-grid">
            <label>
              Login URL
              <input id="loginUrl" type="url" value="http://127.0.0.1:4280/login.php" />
            </label>

            <label>
              Username
              <input id="username" type="text" value="admin" />
            </label>

            <label>
              Password
              <input id="password" type="password" value="password" />
            </label>

            <label>
              Username Field
              <input id="usernameField" type="text" value="username" />
            </label>

            <label>
              Password Field
              <input id="passwordField" type="text" value="password" />
            </label>

            <label>
              Login Method
              <select id="loginMethod">
                <option value="post" selected>POST</option>
                <option value="get">GET</option>
              </select>
            </label>

            <label>
              Security URL
              <input id="securityUrl" type="url" value="http://127.0.0.1:4280/security.php" />
            </label>

            <label>
              Security Level
              <select id="securityLevel">
                <option value="low" selected>low</option>
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="impossible">impossible</option>
              </select>
            </label>

            <label>
              Security Field
              <input id="securityField" type="text" value="security" />
            </label>

            <label class="full">
              Extra Fields (JSON object)
              <textarea id="extraFields" rows="4">{"Login":"Login"}</textarea>
            </label>
          </div>

          <div class="full actions">
            <button id="startBtn" type="submit">Start Scan</button>
            <button id="stopPollBtn" type="button" class="ghost">Stop Polling</button>
          </div>
        </form>
      </section>

      <section class="panel status-panel reveal delay-2">
        <h2>Scan Status</h2>
        <div class="status-grid">
          <div>
            <p class="meta">Scan ID</p>
            <p id="scanId" class="value">-</p>
          </div>
          <div>
            <p class="meta">State</p>
            <p id="scanState" class="value badge pending">idle</p>
          </div>
          <div>
            <p class="meta">Target</p>
            <p id="scanTarget" class="value">-</p>
          </div>
          <div>
            <p class="meta">Updated</p>
            <p id="updatedAt" class="value">-</p>
          </div>
        </div>
      </section>

      <section class="panel findings-panel reveal delay-3">
        <div class="findings-head">
          <h2>Findings</h2>
          <div class="pill-row">
            <span id="countAll" class="pill">All: 0</span>
            <span id="countHigh" class="pill high">High: 0</span>
            <span id="countMedium" class="pill medium">Medium: 0</span>
            <span id="countLow" class="pill low">Low: 0</span>
          </div>
        </div>
        <div id="results" class="results-empty">No results yet.</div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
